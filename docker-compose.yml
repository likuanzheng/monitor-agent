services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'   # 数据保留 30 天
      - '--web.enable-lifecycle'               # 允许热重载配置
    volumes:
      - './prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - './targets:/etc/prometheus/targets:ro'
      - 'prom_data:/prometheus'

  monitor-agent:
    build: ./agent
    container_name: monitor-agent
    restart: unless-stopped
    environment:
      - PROM_URL=http://prometheus:9090   # 同网络用容器名访问，无需 IP
      - INTERVAL=15                        # 轮询间隔秒
    volumes:
      - './agent/config.yaml:/app/config.yaml:ro'   # 改配置不用重建镜像
      - 'agent_data:/data'                          # devices.json 落在这里
    depends_on:
      - prometheus

volumes:
  prom_data:
  agent_data:
